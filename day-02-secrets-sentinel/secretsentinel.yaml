# secretsentinel.yaml — default configuration
# Place in the root of the repo being scanned.

scan:
  # Minimum severity to report: CRITICAL | HIGH | MEDIUM | LOW
  severity: MEDIUM

  # Fail exit-code threshold: CRITICAL | HIGH | MEDIUM | LOW
  fail_on: HIGH

  # Enable Shannon entropy analysis
  entropy: true

  # Override entropy threshold (default: 4.5 for base64, 3.2 for hex)
  # entropy_threshold: 4.5

  # Additional ignore patterns (appended to .secretsignore)
  ignore:
    - "*.example"
    - "sample_data/**"

output:
  # Default format: terminal | json | sarif | html | csv
  format: terminal

  # Enable colour output
  color: true

# Patterns to disable (by pattern ID — see scanner/patterns.py)
disabled_patterns:
  - SSH_HOST_KEY      # public keys are usually fine

# Baseline: fingerprints of known/accepted findings
# Generate with: python main.py . --format json | jq '[.findings[].fingerprint]'
baseline_fingerprints: []
