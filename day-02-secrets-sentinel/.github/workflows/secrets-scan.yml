name: "🔐 SecretSentinel Scan"

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    # Nightly scan at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      severity:
        description: "Minimum severity to report"
        required: false
        default: "MEDIUM"
        type: choice
        options: ["CRITICAL", "HIGH", "MEDIUM", "LOW"]
      fail_on:
        description: "Fail the build on this severity or above"
        required: false
        default: "HIGH"
        type: choice
        options: ["CRITICAL", "HIGH", "MEDIUM", "LOW"]

permissions:
  contents: read
  security-events: write    # upload SARIF to GitHub Advanced Security
  actions: read

jobs:
  # ── Job 1: Quick scan with fail-fast on CRITICAL ──────────────────────────
  secrets-scan:
    name: "Scan for Secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so we can scan all branches

      - name: "🐍 Set up Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "📦 Install SecretSentinel"
        run: |
          pip install -r day-02-secrets-sentinel/requirements.txt
        working-directory: ${{ github.workspace }}

      - name: "🔍 Run SecretSentinel (terminal)"
        id: scan
        run: |
          python day-02-secrets-sentinel/main.py . \
            --severity "${{ github.event.inputs.severity || 'MEDIUM' }}" \
            --fail-on  "${{ github.event.inputs.fail_on  || 'HIGH'   }}" \
            --no-color \
            --verbose
        continue-on-error: true   # we'll check exit code ourselves

      - name: "📄 Generate SARIF report"
        if: always()
        run: |
          python day-02-secrets-sentinel/main.py . \
            --format sarif \
            -o results.sarif \
            --severity MEDIUM \
            --no-color

      - name: "🌐 Generate HTML report"
        if: always()
        run: |
          python day-02-secrets-sentinel/main.py . \
            --format html \
            -o scan-report.html \
            --no-color

      - name: "📊 Generate JSON report"
        if: always()
        run: |
          python day-02-secrets-sentinel/main.py . \
            --format json \
            -o findings.json \
            --no-color

      - name: "⬆️  Upload SARIF to GitHub Advanced Security"
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: SecretSentinel

      - name: "📎 Upload artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "secretsentinel-reports-${{ github.run_number }}"
          path: |
            results.sarif
            scan-report.html
            findings.json
          retention-days: 30

      - name: "💬 Comment PR with summary"
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '### 🔐 SecretSentinel Scan Results\n\n';
            try {
              const findings = JSON.parse(fs.readFileSync('findings.json', 'utf8'));
              const stats = findings.stats;
              summary += `| Metric | Value |\n|--------|-------|\n`;
              summary += `| Files Scanned | ${stats.files_scanned} |\n`;
              summary += `| Total Findings | ${stats.findings_total} |\n`;
              summary += `| 🔴 Critical | ${stats.by_severity.CRITICAL} |\n`;
              summary += `| 🟠 High | ${stats.by_severity.HIGH} |\n`;
              summary += `| 🟡 Medium | ${stats.by_severity.MEDIUM} |\n`;
              if (stats.findings_total === 0) {
                summary += '\n✅ **No secrets detected — clean scan!**';
              } else {
                summary += '\n⚠️ **Secrets detected — review the Security tab for details.**';
              }
            } catch (e) {
              summary += '_Could not parse findings.json_';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: "🚨 Fail if findings above threshold"
        if: steps.scan.outcome == 'failure'
        run: |
          echo "::error::SecretSentinel detected secrets at or above the fail threshold!"
          exit 2

  # ── Job 2: Push Docker image to GHCR on main ─────────────────────────────
  docker-build:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: secrets-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: "🐳 Log in to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "🏷️  Docker meta"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/secretsentinel
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: "🏗️  Build and push"
        uses: docker/build-push-action@v5
        with:
          context: day-02-secrets-sentinel
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
