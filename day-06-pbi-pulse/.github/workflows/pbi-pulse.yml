name: PBI-Pulse Health Scan

on:
  schedule:
    - cron: "0 13 * * 1-5"   # 13:00 UTC, weekdays
  workflow_dispatch: {}
  push:
    paths:
      - "day-06-pbi-pulse/**"

defaults:
  run:
    working-directory: day-06-pbi-pulse

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run health scan (demo mode)
        run: |
          python -m pbi_pulse.cli scan --demo --out reports/ --fail-under 50 || true

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbi-pulse-report
          path: day-06-pbi-pulse/reports/
