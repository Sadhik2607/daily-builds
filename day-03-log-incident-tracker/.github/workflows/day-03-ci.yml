name: Day 03 — LogSentinel CI

on:
  push:
    paths:
      - "day-03-log-incident-tracker/**"
  pull_request:
    paths:
      - "day-03-log-incident-tracker/**"

defaults:
  run:
    working-directory: day-03-log-incident-tracker

jobs:
  # ── Lint & Syntax check ─────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Check syntax
        run: python -m py_compile log_incident_tracker/*.py && echo "✓ Syntax OK"

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest tests/ --cov=log_incident_tracker --cov-report=xml --cov-fail-under=70
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: day-03-log-incident-tracker/coverage.xml
          flags: day03
        continue-on-error: true

  # ── Integration: scan sample files ──────────────────────────────────────────
  integration:
    name: Integration — Scan Sample Logs
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan Apache access log
        run: |
          python -m log_incident_tracker.cli scan sample_data/apache_access.log \
            --format json --output-dir ./ci-output --severity WARNING
          echo "✓ Apache scan complete"

      - name: Scan structured JSON log
        run: |
          python -m log_incident_tracker.cli scan sample_data/app_structured.json \
            --format all --output-dir ./ci-output --severity WARNING
          echo "✓ JSONL scan complete"

      - name: Scan Python app log
        run: |
          python -m log_incident_tracker.cli scan sample_data/python_app.log \
            --format json --output-dir ./ci-output --severity WARNING
          echo "✓ Python log scan complete"

      - name: Scan NGINX error log
        run: |
          python -m log_incident_tracker.cli scan sample_data/nginx_error.log \
            --format json --output-dir ./ci-output --severity WARNING
          echo "✓ NGINX scan complete"

      # Regression gate: verify known incident counts
      - name: Regression gate — verify incident counts
        run: |
          python3 - <<'EOF'
          import json, sys

          with open("ci-output/incidents.json") as f:
              data = json.load(f)

          total = data["summary"]["incidents"]
          critical = data["sre_metrics"]["by_severity"]["CRITICAL"]

          print(f"Total incidents: {total}")
          print(f"Critical incidents: {critical}")

          # Must detect at least these known incidents in app_structured.json
          if total < 3:
              print(f"FAIL: expected ≥3 incidents, got {total}", file=sys.stderr)
              sys.exit(1)
          if critical < 1:
              print(f"FAIL: expected ≥1 CRITICAL incident, got {critical}", file=sys.stderr)
              sys.exit(1)

          print("✓ Regression gate passed")
          EOF

      - name: Upload CI reports
        uses: actions/upload-artifact@v4
        with:
          name: logsentinel-ci-reports
          path: day-03-log-incident-tracker/ci-output/
          retention-days: 7

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t logsentinel:ci .
      - name: Smoke test — scan sample data inside container
        run: |
          docker run --rm \
            -v $(pwd)/sample_data:/data:ro \
            -v $(pwd)/docker-output:/reports \
            logsentinel:ci \
            scan /data/app_structured.json --format json --output-dir /reports
          echo "✓ Docker smoke test passed"
      - name: Verify Docker output
        run: |
          ls -la docker-output/
          cat docker-output/incidents.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print(f'Incidents: {d[\"summary\"][\"incidents\"]}')
          print('✓ Docker output valid JSON')
          "
