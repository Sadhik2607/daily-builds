name: CI

on:
  push:
    paths:
      - "day-04-queryguard/**"
  pull_request:
    paths:
      - "day-04-queryguard/**"

defaults:
  run:
    working-directory: day-04-queryguard

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build demo SQLite DB
        run: python sample_data/build_demo_db.py sample_data/demo.sqlite3

      - name: Run unit tests (regression gate)
        run: pytest tests/ -v

      - name: Run QueryGuard against demo DB (all formats)
        run: |
          python -m queryguard.cli scan sample_data/demo.sqlite3 \
            --queries sample_data/sample_queries.sql \
            --format all \
            --output-dir ./reports

      - name: Fail build if CRITICAL findings present
        run: |
          python -m queryguard.cli scan sample_data/demo.sqlite3 --fail-on CRITICAL

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: queryguard-reports
          path: day-04-queryguard/reports/

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t queryguard:ci .

      - name: Smoke test image
        run: docker run --rm queryguard:ci --help
